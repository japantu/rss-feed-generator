name: Update RSS

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        persist-credentials: false  # ← これが重要！

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.x

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run script
      run: python generate_rss.py

    - name: Commit and push
      run: |
        git config --global user.name "rss-bot"
        git config --global user.email "rss@example.com"
        git remote set-url origin https://x-access-token:${{ secrets.ACCESS_TOKEN }}@github.com/${{ github.repository }}
        git add rss_output.xml
        git commit -m "Auto update RSS" || echo "No changes"
        git push
