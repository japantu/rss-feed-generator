name: Update RSS

on:
  schedule:
    - cron: '*/10 * * * *'  # 毎10分に実行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate RSS
        run: python generate_rss.py

      - name: Commit and push
        run: |
          git config --global user.name "rss-bot"
          git config --global user.email "rss@example.com"
          git add rss_output.xml
          git commit -m "Auto update RSS" || echo "No changes"
          git push
